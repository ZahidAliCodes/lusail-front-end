<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Booking Summary</title>

    <link rel="icon" type="image/x-icon" href="../assets/images/favicon.png" />

    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" href="../css/pages/summary.css" />
    <link rel="stylesheet" href="../css/pages/slots.css" />

    <link rel="stylesheet" href="../assets/icons/css/all.min.css" />
</head>

<body class="home">
    <div id="header-container"></div>

    <section>
        <div class="bg-right-img">
            <div class="container">
                <h1>EVENTS REGISTRATION</h1>
            </div>
        </div>
    </section>

    <section class="main-section">
        <div class="racing-banner">
            <img src="../assets/images/hero-img-1.svg" alt="hero" />
        </div>

        <div class="container up-side">
            <section id="step-5" class="step-event active">
                <div class="card-base card-base-main">
                    <img
              src="../assets/images/corner-arrow.svg"
              class="top-right"
              alt="arrow" />
                    <button class="back-nav" onclick="window.location.href = 'slots.html'">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <path
                                d="M21 0.45C20.85 0.15 20.55 0 20.25 0H12.75C12.45 0 12.3 0.15 12.15 0.3L3.15 11.55C3 11.85 3 12.15 3.15 12.45L11.4 23.7C11.55 23.85 11.7 24 12 24H20.25C20.55 24 20.85 23.85 21 23.55C21 23.25 21 22.95 20.85 22.8L12.15 12L20.85 1.2C21 1.05 21 0.9 21 0.75V0.45Z"
                                fill="currentColor"></path>
                        </svg>
                        <span id="summaryEventTitle"></span>
                        <span> - </span>
                        <span id="summaryEventDate"></span>
                    </button>

                    <div class="summary-img">
                        <img id="summaryEventImg" src="" class="hero-img" alt="event" />
                    </div>
                    <div class="summary-main">
                        <h1>Booking Summary</h1>

                        <div class="booking-status">
                            <div class="table-wrapper">
                                <table>
                                    <thead>
                                        <tr>
                                            <th>Session</th>
                                            <th>Price</th>
                                            <th>Start Time</th>
                                            <th>Slots</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr>
                                            <td>Session 1</td>
                                            <td>125.00 QAR</td>
                                            <td>17:45:00</td>
                                            <td>04</td>
                                        </tr>
                                        <tr>
                                            <td>Session 2</td>
                                            <td>125.00 QAR</td>
                                            <td>18:30:00</td>
                                            <td>04</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>

                            <div class="promo-box">
                                <p>Time to Order: <span>02:33 minutes</span></p>

                                <form class="promo-group">
                                    <label> If you have a Promo Code, Please enter it here:</label>
                                    <input type="text" placeholder="Promo code" " />
                </form>

               <button class="btn btn-next">Next</button>
                <img src="../assets/images/cornor-arrow.svg" alt="arrow">
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </section>

    <div id="footer-container"></div>

    <script src="../js/main.js"></script>
    <script src="../js/components/stepform.js"></script>
</body>

</html>
